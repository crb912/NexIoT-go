name: Build and Package

on:
  push:
    branches: ["main", "master"]
    tags: ["v*"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

env:
  SERVICE_NAME: next-iot-go
  GO_VERSION: "1.23"

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set version
        id: version
        run: |
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          COMMIT=$(git rev-parse --short HEAD)
          VERSION="${BRANCH}-${COMMIT}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p bin
          GOOS=linux GOARCH=${{ matrix.arch }} CGO_ENABLED=0 \
            go build \
              -ldflags="-s -w -X device.Version=${VERSION} -X main.serviceName=${SERVICE_NAME}" \
              -o bin/${SERVICE_NAME} \
              ./cmd/main.go

      - name: Verify binary
        run: |
          file bin/${SERVICE_NAME}
          ls -lh bin/${SERVICE_NAME}

      - name: Package (tar.gz)
        run: |
          ARTIFACT="${SERVICE_NAME}-linux-${{ matrix.arch }}-${{ steps.version.outputs.version }}"
          mkdir -p "dist/${ARTIFACT}"
          cp bin/${SERVICE_NAME} "dist/${ARTIFACT}/"
          cp -r res "dist/${ARTIFACT}/"
          tar -czf "dist/${ARTIFACT}.tar.gz" -C dist "${ARTIFACT}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.SERVICE_NAME }}-linux-${{ matrix.arch }}
          path: dist/${{ env.SERVICE_NAME }}-linux-${{ matrix.arch }}-*.tar.gz
          if-no-files-found: error
          retention-days: 30

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
