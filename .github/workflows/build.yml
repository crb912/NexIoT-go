name: Build and Package

on:
  push:
    branches: ["main", "master"]
    tags: ["v*"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

env:
  SERVICE_NAME: next-iot-go
  GO_VERSION: "1.23"

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libzmq3-dev

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set version
        id: version
        run: |
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          COMMIT=$(git rev-parse --short HEAD)
          VERSION="${BRANCH}-${COMMIT}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p bin
          GOOS=linux GOARCH=${{ matrix.arch }} CGO_ENABLED=1 \
            go build \
              -ldflags="-s -w -X device.Version=${VERSION} -X main.serviceName=${SERVICE_NAME}" \
              -o bin/${SERVICE_NAME} \
              ./cmd/main.go

      - name: Verify binary
        run: |
          file bin/${SERVICE_NAME}
          ls -lh bin/${SERVICE_NAME}

      - name: Package (tar.gz)
        run: |
          ARTIFACT="${SERVICE_NAME}-linux-${{ matrix.arch }}-${{ steps.version.outputs.version }}"
          mkdir -p "dist/${ARTIFACT}"
          cp bin/${SERVICE_NAME} "dist/${ARTIFACT}/"
          cp -r res "dist/${ARTIFACT}/"
          cp -r simulator "dist/${ARTIFACT}/"

          printf '%s\n' \
            "NexIoT-go — Multi-Protocol Industrial IoT Edge Gateway" \
            "======================================================" \
            "" \
            "Quick Start" \
            "-----------" \
            "EDGEX_SECURITY_SECRET_STORE=false ./next-iot-go --confdir=./res --file=configuration.toml --overwrite" \
            "" \
            "Simulators" \
            "----------" \
            "Device simulators are included in the simulator/ directory:" \
            "  python3 simulator/modbus.py    # Modbus TCP on port 5020" \
            "  python3 simulator/snmp.py      # SNMP agent" \
            "  python3 simulator/snmp_trap.py # SNMP trap sender" \
            "  python3 simulator/http_device.py" \
            "  python3 simulator/mqtt.py" \
            "  python3 simulator/opc.py" \
            > "dist/${ARTIFACT}/HOW_TO_USE.txt"

          tar -czf "dist/${ARTIFACT}.tar.gz" -C dist "${ARTIFACT}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.SERVICE_NAME }}-linux-${{ matrix.arch }}
          path: dist/${{ env.SERVICE_NAME }}-linux-${{ matrix.arch }}-*.tar.gz
          if-no-files-found: error
          retention-days: 30

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
