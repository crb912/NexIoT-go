<svg width="680" height="920" viewBox="0 0 680 920" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>device-sdk-go v2.3.0 — Callback Trigger Flow</title>
  <desc>Shows how AddDevice, UpdateDevice, RemoveDevice callbacks are triggered from core-metadata through the HTTP layer to the ProtocolDriver interface</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <!-- Color palette -->
    <!-- Blue: #E6F1FB fill, #378ADD stroke, #0C447C text -->
    <!-- Teal: #E1F5EE fill, #1D9E75 stroke, #085041 text -->
    <!-- Purple: #EEEDFE fill, #7F77DD stroke, #3C3489 text -->
    <!-- Amber: #FAEEDA fill, #BA7517 stroke, #633806 text -->
    <!-- Coral: #FAECE7 fill, #D85A30 stroke, #712B13 text -->
    <!-- Gray: #F1EFE8 fill, #888780 stroke, #444441 text -->
  </defs>

  <!-- Background -->
  <rect width="680" height="920" fill="#ffffff"/>

  <!-- ══════════════════════════════════════════
       TIER 0 — Trigger sources label
  ══════════════════════════════════════════ -->
  <text x="340" y="26" text-anchor="middle"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#888780">
    Trigger Sources (two paths)
  </text>

  <!-- Path A: External REST → core-metadata -->
  <rect x="40" y="38" width="240" height="56" rx="8"
        fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text x="160" y="62" text-anchor="middle" dominant-baseline="central"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="500" fill="#0C447C">
    External REST Request
  </text>
  <text x="160" y="82" text-anchor="middle" dominant-baseline="central"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#185FA5">
    POST/PUT/DELETE core-metadata /device
  </text>

  <!-- Path B: Startup provision -->
  <rect x="400" y="38" width="240" height="56" rx="8"
        fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="520" y="62" text-anchor="middle" dominant-baseline="central"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="500" fill="#085041">
    Service Startup Provision
  </text>
  <text x="520" y="82" text-anchor="middle" dominant-baseline="central"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#0F6E56">
    provision.LoadDevices() → dc.Add()
  </text>

  <!-- Arrows from sources converging -->
  <line x1="160" y1="94" x2="160" y2="130" stroke="#378ADD" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="520" y1="94" x2="520" y2="130" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M160 145 Q160 155 240 160 Q310 165 338 168" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M520 145 Q520 155 440 160 Q370 165 342 168" fill="none" stroke="#888780" stroke-width="1"/>

  <!-- ══════════════════════════════════════════
       TIER 1 — core-metadata HTTP callback
  ══════════════════════════════════════════ -->
  <rect x="140" y="170" width="400" height="56" rx="8"
        fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="340" y="192" text-anchor="middle" dominant-baseline="central"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">
    core-metadata sends HTTP Callback
  </text>
  <text x="340" y="212" text-anchor="middle" dominant-baseline="central"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#5F5E5A">
    POST/PUT /api/v2/callback/device   |   DELETE /api/v2/callback/device/name/{name}
  </text>

  <line x1="340" y1="226" x2="340" y2="258" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════════
       TIER 2 — REST router
  ══════════════════════════════════════════ -->
  <rect x="140" y="260" width="400" height="56" rx="8"
        fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="340" y="282" text-anchor="middle" dominant-baseline="central"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">
    internal/controller/http/restrouter.go
  </text>
  <text x="340" y="302" text-anchor="middle" dominant-baseline="central"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#5F5E5A">
    InitRestRoutes() registers mux routes → RestController handlers
  </text>

  <line x1="340" y1="316" x2="340" y2="342" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Tier 3 label -->
  <text x="340" y="350" text-anchor="middle"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#888780">
    internal/controller/http/callback.go
  </text>

  <!-- ══════════════════════════════════════════
       TIER 3 — HTTP handlers (3 boxes)
  ══════════════════════════════════════════ -->
  <!-- AddDevice handler -->
  <rect x="40" y="358" width="175" height="56" rx="8"
        fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="128" y="378" text-anchor="middle" dominant-baseline="central"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="500" fill="#3C3489">
    AddDevice()
  </text>
  <text x="128" y="398" text-anchor="middle" dominant-baseline="central"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#534AB7">
    decode JSON → AddDeviceRequest
  </text>

  <!-- UpdateDevice handler -->
  <rect x="253" y="358" width="174" height="56" rx="8"
        fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="340" y="378" text-anchor="middle" dominant-baseline="central"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="500" fill="#3C3489">
    UpdateDevice()
  </text>
  <text x="340" y="398" text-anchor="middle" dominant-baseline="central"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#534AB7">
    decode JSON → UpdateDeviceRequest
  </text>

  <!-- DeleteDevice handler -->
  <rect x="465" y="358" width="175" height="56" rx="8"
        fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="553" y="378" text-anchor="middle" dominant-baseline="central"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="500" fill="#3C3489">
    DeleteDevice()
  </text>
  <text x="553" y="398" text-anchor="middle" dominant-baseline="central"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#534AB7">
    extract URL name param
  </text>

  <!-- Arrows from HTTP handlers down -->
  <line x1="128" y1="414" x2="128" y2="444" stroke="#7F77DD" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="340" y1="414" x2="340" y2="444" stroke="#7F77DD" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="553" y1="414" x2="553" y2="444" stroke="#7F77DD" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Tier 4 label -->
  <text x="340" y="442" text-anchor="middle"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="12" fill="#888780">
    internal/application/callback.go
  </text>

  <!-- ══════════════════════════════════════════
       TIER 4 — Application layer (3 boxes)
  ══════════════════════════════════════════ -->
  <!-- AddDevice app -->
  <rect x="40" y="450" width="175" height="92" rx="8"
        fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="128" y="472" text-anchor="middle" dominant-baseline="central"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="500" fill="#412402">
    AddDevice()
  </text>
  <text x="128" y="492" text-anchor="middle" dominant-baseline="central"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#633806">
    ① update profile cache
  </text>
  <text x="128" y="508" text-anchor="middle" dominant-baseline="central"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#633806">
    ② cache.Devices().Add()
  </text>
  <text x="128" y="526" text-anchor="middle" dominant-baseline="central"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="500" fill="#854F0B">
    ③ driver.AddDevice() ←
  </text>

  <!-- UpdateDevice app -->
  <rect x="253" y="450" width="174" height="92" rx="8"
        fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="340" y="472" text-anchor="middle" dominant-baseline="central"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="500" fill="#412402">
    UpdateDevice()
  </text>
  <text x="340" y="492" text-anchor="middle" dominant-baseline="central"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#633806">
    ① lookup / patch device
  </text>
  <text x="340" y="508" text-anchor="middle" dominant-baseline="central"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#633806">
    ② cache.Devices().Update()
  </text>
  <text x="340" y="526" text-anchor="middle" dominant-baseline="central"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="500" fill="#854F0B">
    ③ driver.UpdateDevice() ←
  </text>

  <!-- DeleteDevice app -->
  <rect x="465" y="450" width="175" height="92" rx="8"
        fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="553" y="472" text-anchor="middle" dominant-baseline="central"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="500" fill="#412402">
    DeleteDevice()
  </text>
  <text x="553" y="492" text-anchor="middle" dominant-baseline="central"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#633806">
    ① stop AutoEvents
  </text>
  <text x="553" y="508" text-anchor="middle" dominant-baseline="central"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#633806">
    ② cache.Devices().Remove()
  </text>
  <text x="553" y="526" text-anchor="middle" dominant-baseline="central"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" font-weight="500" fill="#854F0B">
    ③ driver.RemoveDevice() ←
  </text>

  <!-- Arrows from app layer down -->
  <line x1="128" y1="542" x2="128" y2="572" stroke="#BA7517" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="340" y1="542" x2="340" y2="572" stroke="#BA7517" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="553" y1="542" x2="553" y2="572" stroke="#BA7517" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Converge lines -->
  <path d="M128 588 Q128 600 240 606 Q310 610 338 612" fill="none" stroke="#888780" stroke-width="1"/>
  <path d="M553 588 Q553 600 440 606 Q370 610 342 612" fill="none" stroke="#888780" stroke-width="1"/>
  <line x1="340" y1="588" x2="340" y2="612" stroke="#888780" stroke-width="1"/>
  <line x1="340" y1="612" x2="340" y2="630" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- DI container note -->
  <text x="340" y="626" text-anchor="middle"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#888780">
    container.ProtocolDriverFrom(dic.Get)  —  resolve driver from DI container
  </text>

  <!-- ══════════════════════════════════════════
       TIER 5 — ProtocolDriver interface
  ══════════════════════════════════════════ -->
  <rect x="100" y="636" width="480" height="92" rx="8"
        fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
  <text x="340" y="660" text-anchor="middle" dominant-baseline="central"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="500" fill="#4A1B0C">
    pkg/models/protocoldriver.go  —  ProtocolDriver interface
  </text>
  <text x="340" y="682" text-anchor="middle" dominant-baseline="central"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#712B13">
    AddDevice(name, protocols, adminState) error
  </text>
  <text x="340" y="700" text-anchor="middle" dominant-baseline="central"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#712B13">
    UpdateDevice(name, protocols, adminState) error
  </text>
  <text x="340" y="718" text-anchor="middle" dominant-baseline="central"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#712B13">
    RemoveDevice(name, protocols) error
  </text>

  <line x1="340" y1="728" x2="340" y2="758" stroke="#D85A30" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════════
       TIER 6 — User driver implementation
  ══════════════════════════════════════════ -->
  <rect x="100" y="760" width="480" height="56" rx="8"
        fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="340" y="782" text-anchor="middle" dominant-baseline="central"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" font-weight="500" fill="#04342C">
    User-implemented ProtocolDriver (e.g. device-mqtt-go Driver)
  </text>
  <text x="340" y="802" text-anchor="middle" dominant-baseline="central"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#085041">
    Custom logic: subscribe MQTT topic, open TCP connection, allocate resources, etc.
  </text>

  <!-- ══════════════════════════════════════════
       SIDE NOTE — startup cache behavior
  ══════════════════════════════════════════ -->
  <rect x="40" y="844" width="600" height="56" rx="8"
        fill="none" stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="5 4"/>
  <text x="340" y="866" text-anchor="middle"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#5F5E5A">
    ⚠  Note: on startup, cache.InitCache() loads existing devices from core-metadata into memory cache.
  </text>
  <text x="340" y="884" text-anchor="middle"
        font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#5F5E5A">
    driver.AddDevice() is NOT called for pre-existing devices — only new add/update/delete operations trigger callbacks.
  </text>
</svg>
