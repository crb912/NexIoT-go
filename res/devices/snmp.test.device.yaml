# Pre-define Devices
# NOTE: You will need to modify the Address to a DNS or named resource potentially.
#       Port 161 is the default SNMP provider port.
deviceList:
  - name: "snmp-trendnet01"
    profileName: "Test-Trendnet-Profile"
    description: "Switch SNMP service interface"
    labels: [ "device-snmp-switch-example" ]
    protocols:
      TCP:
        Address: "127.0.0.1"
        Port: "1610"
    autoEvents:
      - interval: "10s"
        onChange: true
        sourceName: "MacAddress"

      - interval: "15s"
        onChange: true
        sourceName: "Firmware"

      - interval: "5s"
        onChange: false
        sourceName: "Uptime"