name: "Test-Trendnet-Profile"
manufacturer: "TrendNet corp"
model: "TPE-082WS"
labels:
  - "trendnet"
  - "edge switch"
description: "TrendNet Powered Switch accessed via SNMP"

deviceResources:
  -
    name: RebootCurrentState
    description: "Switch reboot current state"
    attributes:
      { address: "1.3.6.1.4.1.28866.2.37.24.5.1.0", length: "4" }
    properties:
      valueType: "Int32"
      readWrite: "R"
      minimum: 1
      maximum: 3
      defaultValue: 1
  -
    name: RebootControlState
    description: "Switch reboot control state"
    attributes:
      { address: "1.3.6.1.4.1.28866.2.37.24.5.1.0", length: "4" }
    properties:
      valueType: "Int32"
      readWrite: "RW"
      minimum: 1
      maximum: 3
      defaultValue: 1
  -
    name: UpTimeCurrentState
    description: "Switch uptime current state"
    attributes:
      { address: "1.3.6.1.4.1.28866.2.26.16.1.1.0" }
    properties:
      valueType: "Uint64"
      readWrite: "R"
      minimum: 0
      maximum: 18446744073709551615
      defaultValue: 999
  -
    name: MacAddressCurrentState
    description: "Switch Mac address"
    attributes:
      { address: "1.3.6.1.4.1.28866.2.26.16.2.1.0"  }
    properties:
      valueType: "String"
      readWrite: "R"
      defaultValue: "AA:BB:CC:DD:EE:FF"
  -
    name: FirmwareCurrentState
    description: "Switch firmware version"
    attributes:
      { address: "1.3.6.1.4.1.28866.2.26.16.1.2.0"  }
    properties:
      valueType: "String"
      readWrite: "R"
  -
    name: IPV4AddressCurrentState
    description: "Switch IPV4 address"
    attributes:
      { address: "1.3.6.1.4.1.28866.2.26.16.3.2.0"  }
    properties:
      valueType: "String"
      readWrite: "R"
  -
    name: IPV4SubnetMaskCurrentState
    description: "Switch IPV4 subnet mask"
    attributes:
      { address: "1.3.6.1.4.1.28866.2.26.16.3.3.0"  }
    properties:
      valueType: "String"
      readWrite: "R"
  -
    name: IPV4GatewayAddressCurrentState
    description: "Switch IPV4 gateway address"
    attributes:
      { address: "1.3.6.1.4.1.28866.2.26.16.3.4.0"  }
    properties:
      valueType: "String"
      readWrite: "R"

deviceCommands:
  -
    name: Reboot
    readWrite: "R"
    resourceOperations:
      - { deviceResource: "RebootCurrentState" }
  -
    name: Uptime
    readWrite: "R"
    resourceOperations:
      - { deviceResource: "UpTimeCurrentState" }
  -
    name: MacAddress
    readWrite: "R"
    resourceOperations:
      - { deviceResource: "MacAddressCurrentState" }
  -
    name: Firmware
    readWrite: "R"
    resourceOperations:
      - { deviceResource: "FirmwareCurrentState" }
  -
    name: IPV4Address
    readWrite: "R"
    resourceOperations:
      - { deviceResource: "IPV4AddressCurrentState" }
  -
    name: IPV4SubnetMask
    readWrite: "R"
    resourceOperations:
      - { deviceResource: "IPV4SubnetMaskCurrentState" }
  -
    name: IPV4GatewayAddress
    readWrite: "R"
    resourceOperations:
      - { deviceResource: "IPV4GatewayAddressCurrentState" }
